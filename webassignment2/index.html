<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Auth — Enter</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0d0d;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --gold: #c8a96e;
      --gold-light: #e2c98a;
      --rust: #9b4f2f;
      --muted: #8a8070;
      --line: rgba(13,13,13,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', serif;
      background: var(--paper);
      color: var(--ink);
      overflow: hidden;
    }

    /* ── NOISE TEXTURE OVERLAY ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    /* ── LAYOUT ── */
    .stage {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      background: var(--ink);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 3rem;
    }

    .panel-left::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(200,169,110,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -80px; right: -80px;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(155,79,47,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 1;
    }

    .brand-mark {
      width: 44px; height: 44px;
      border: 1.5px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
      transform: rotate(45deg);
    }

    .brand-mark span {
      transform: rotate(-45deg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--gold);
      letter-spacing: 0.05em;
    }

    .brand-name {
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--paper);
      font-family: 'DM Mono', monospace;
    }

    .panel-quote {
      position: relative;
      z-index: 1;
    }

    .quote-text {
      font-size: 2.8rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.25;
      color: var(--paper);
      margin-bottom: 1.5rem;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s 0.4s ease forwards;
    }

    .quote-text em {
      color: var(--gold);
      font-style: normal;
    }

    .quote-author {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* ── DECORATIVE LINES ── */
    .deco-lines {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 300px; height: 300px;
      pointer-events: none;
      z-index: 0;
    }

    .deco-lines circle {
      fill: none;
      stroke: rgba(200,169,110,0.08);
      stroke-width: 1;
    }

    /* ── RIGHT PANEL ── */
    .panel-right {
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      position: relative;
    }

    .panel-right::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 50%, transparent 100%);
    }

    /* ── FORM CONTAINER ── */
    .form-wrap {
      width: 100%;
      max-width: 380px;
    }

    /* ── TAB SWITCHER ── */
    .tabs {
      display: flex;
      gap: 2rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--line);
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 0 1rem 0;
      position: relative;
      transition: color 0.3s;
    }

    .tab-btn.active {
      color: var(--ink);
    }

    .tab-btn::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 2px;
      background: var(--gold);
      transform: scaleX(0);
      transition: transform 0.3s ease;
    }

    .tab-btn.active::after { transform: scaleX(1); }

    /* ── FORM ── */
    .form-panel {
      display: none;
      flex-direction: column;
      gap: 1.4rem;
    }

    .form-panel.active {
      display: flex;
      animation: panelIn 0.5s ease;
    }

    @keyframes panelIn {
      from { opacity: 0; transform: translateX(12px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .form-heading {
      font-size: 2.2rem;
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 0.3rem;
    }

    .form-heading em {
      font-style: italic;
      color: var(--gold);
    }

    .form-subtext {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      margin-bottom: 0.5rem;
    }

    /* ── FIELD ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .field label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field-inner {
      position: relative;
    }

    .field input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--line);
      padding: 0.7rem 2.2rem 0.7rem 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: var(--ink);
      outline: none;
      transition: border-color 0.3s;
    }

    .field input:focus { border-bottom-color: var(--gold); }

    .field input::placeholder { color: rgba(13,13,13,0.25); }

    .field-icon {
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 18px; height: 18px;
      color: var(--muted);
      pointer-events: none;
    }

    .toggle-pw {
      pointer-events: all !important;
      cursor: pointer;
    }

    /* ── NAME ROW ── */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    /* ── ERROR ── */
    .field-error {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--rust);
      letter-spacing: 0.06em;
      min-height: 1rem;
      display: block;
    }

    /* ── FORGOT ── */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
    }

    .forgot-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
    }

    .forgot-link:hover { color: var(--ink); border-bottom-color: var(--ink); }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      margin-top: 0.5rem;
      border: none;
      cursor: pointer;
      background: var(--ink);
      color: var(--paper);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 1.1rem 2rem;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .btn-submit::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold) 0%, var(--rust) 100%);
      transform: translateX(-101%);
      transition: transform 0.4s ease;
    }

    .btn-submit:hover::before { transform: translateX(0); }

    .btn-submit span { position: relative; z-index: 1; }

    .btn-submit:active { transform: scale(0.98); }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px;
      background: var(--line);
    }

    /* ── SOCIAL BUTTONS ── */
    .social-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }

    .btn-social {
      border: 1px solid var(--line);
      background: transparent;
      cursor: pointer;
      padding: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink);
      transition: border-color 0.25s, background 0.25s;
    }

    .btn-social:hover { border-color: var(--gold); background: rgba(200,169,110,0.06); }

    .btn-social svg { width: 14px; height: 14px; }

    /* ── SUCCESS TOAST ── */
    .toast {
      position: fixed;
      bottom: 2rem; right: 2rem;
      background: var(--ink);
      color: var(--paper);
      padding: 1rem 1.5rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      display: flex; align-items: center; gap: 0.8rem;
      transform: translateY(100px);
      opacity: 0;
      transition: transform 0.4s ease, opacity 0.4s ease;
      z-index: 1000;
    }

    .toast.show { transform: translateY(0); opacity: 1; }

    .toast-dot {
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }

    /* ── STRENGTH BAR ── */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 4px;
    }

    .strength-seg {
      height: 3px; flex: 1;
      background: var(--line);
      transition: background 0.3s;
    }

    .strength-seg.weak { background: var(--rust); }
    .strength-seg.medium { background: var(--gold); }
    .strength-seg.strong { background: #5a8a5a; }

    /* ── TERMS ── */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
    }

    .terms-row input[type="checkbox"] {
      accent-color: var(--gold);
      width: 14px; height: 14px;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .terms-row label {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      line-height: 1.5;
    }

    .terms-row a { color: var(--gold); text-decoration: none; border-bottom: 1px solid var(--gold); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      .stage { grid-template-columns: 1fr; }
      .panel-left { display: none; }
      .panel-right { padding: 2rem 1.5rem; align-items: flex-start; padding-top: 4rem; overflow-y: auto; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

<div class="stage">

  <!-- ── LEFT PANEL ── -->
  <div class="panel-left">
    <svg class="deco-lines" viewBox="0 0 300 300">
      <circle cx="150" cy="150" r="80"/>
      <circle cx="150" cy="150" r="110"/>
      <circle cx="150" cy="150" r="140"/>
    </svg>

    <div class="brand">
      <div class="brand-mark"><span>V</span></div>
      <div class="brand-name">Vault</div>
    </div>

    <div class="panel-quote">
      <p class="quote-text">A place for those who <em>move</em> with intention.</p>
      <p class="quote-author">— Est. 2024</p>
    </div>
  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel-right">
    <div class="form-wrap">

      <!-- TABS -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="login">Sign In</button>
        <button class="tab-btn" data-tab="signup">Create Account</button>
      </div>

      <!-- ── LOGIN FORM ── -->
      <div class="form-panel active" id="form-login">
        <div>
          <h1 class="form-heading">Welcome<br/><em>back.</em></h1>
          <p class="form-subtext">Enter your credentials to continue</p>
        </div>

        <div class="field">
          <label>Email Address</label>
          <div class="field-inner">
            <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 4h16v16H4z" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="field-error" id="login-email-err"></span>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="field-inner">
            <input type="password" id="login-pw" placeholder="••••••••"/>
            <svg class="field-icon toggle-pw" id="toggle-login-pw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <span class="field-error" id="login-pw-err"></span>
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="btn-submit" id="btn-login"><span>Continue →</span></button>

        <div class="divider">or</div>

        <div class="social-row">
          <button class="btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
            GitHub
          </button>
        </div>
      </div>

      <!-- ── SIGNUP FORM ── -->
      <div class="form-panel" id="form-signup">
        <div>
          <h1 class="form-heading">Create your<br/><em>account.</em></h1>
          <p class="form-subtext">Join thousands who trust Vault</p>
        </div>

        <div class="name-row">
          <div class="field">
            <label>First Name</label>
            <div class="field-inner">
              <input type="text" id="signup-fname" placeholder="Jane"/>
            </div>
            <span class="field-error" id="signup-fname-err"></span>
          </div>
          <div class="field">
            <label>Last Name</label>
            <div class="field-inner">
              <input type="text" id="signup-lname" placeholder="Doe"/>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Email Address</label>
          <div class="field-inner">
            <input type="email" id="signup-email" placeholder="you@example.com"/>
            <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><polyline points="22,6 12,13 2,6"/></svg>
          </div>
          <span class="field-error" id="signup-email-err"></span>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="field-inner">
            <input type="password" id="signup-pw" placeholder="Create a strong password" oninput="checkStrength(this.value)"/>
            <svg class="field-icon toggle-pw" id="toggle-signup-pw" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="strength-bar">
            <div class="strength-seg" id="seg1"></div>
            <div class="strength-seg" id="seg2"></div>
            <div class="strength-seg" id="seg3"></div>
            <div class="strength-seg" id="seg4"></div>
          </div>
          <span class="field-error" id="signup-pw-err"></span>
        </div>

        <div class="field">
          <label>Confirm Password</label>
          <div class="field-inner">
            <input type="password" id="signup-pw2" placeholder="Repeat password"/>
          </div>
          <span class="field-error" id="signup-pw2-err"></span>
        </div>

        <div class="terms-row">
          <input type="checkbox" id="terms"/>
          <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
        </div>
        <span class="field-error" id="terms-err"></span>

        <button class="btn-submit" id="btn-signup"><span>Create Account →</span></button>

        <div class="divider">or sign up with</div>

        <div class="social-row">
          <button class="btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="btn-social">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/></svg>
            GitHub
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg">Welcome back!</span>
</div>

<script>
  // ── TAB SWITCHING ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('form-' + btn.dataset.tab).classList.add('active');
      clearAllErrors();
    });
  });

  // ── PASSWORD TOGGLE ──
  function setupToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', () => {
      const input = document.getElementById(inputId);
      const tog = document.getElementById(toggleId);
      if (input.type === 'password') {
        input.type = 'text';
        tog.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        tog.innerHTML = `<path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>`;
      }
    });
  }
  setupToggle('toggle-login-pw', 'login-pw');
  setupToggle('toggle-signup-pw', 'signup-pw');

  // ── PASSWORD STRENGTH ──
  function checkStrength(val) {
    const segs = [document.getElementById('seg1'), document.getElementById('seg2'),
                  document.getElementById('seg3'), document.getElementById('seg4')];
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const cls = score <= 1 ? 'weak' : score <= 2 ? 'medium' : 'strong';
    segs.forEach((s, i) => {
      s.className = 'strength-seg';
      if (i < score) s.classList.add(cls);
    });
  }

  // ── VALIDATION ──
  function setErr(id, msg) {
    const el = document.getElementById(id);
    if (el) el.textContent = msg;
  }

  function clearAllErrors() {
    document.querySelectorAll('.field-error').forEach(e => e.textContent = '');
  }

  function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // ── LOGIN ──
  document.getElementById('btn-login').addEventListener('click', () => {
    clearAllErrors();
    const email = document.getElementById('login-email').value.trim();
    const pw = document.getElementById('login-pw').value;
    let valid = true;

    if (!email) { setErr('login-email-err', 'Email is required.'); valid = false; }
    else if (!validateEmail(email)) { setErr('login-email-err', 'Enter a valid email.'); valid = false; }

    if (!pw) { setErr('login-pw-err', 'Password is required.'); valid = false; }
    else if (pw.length < 6) { setErr('login-pw-err', 'Password must be at least 6 characters.'); valid = false; }

    if (valid) showToast('Welcome back to Vault ✦');
  });

  // ── SIGNUP ──
  document.getElementById('btn-signup').addEventListener('click', () => {
    clearAllErrors();
    const fname = document.getElementById('signup-fname').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const pw = document.getElementById('signup-pw').value;
    const pw2 = document.getElementById('signup-pw2').value;
    const terms = document.getElementById('terms').checked;
    let valid = true;

    if (!fname) { setErr('signup-fname-err', 'First name is required.'); valid = false; }
    if (!email) { setErr('signup-email-err', 'Email is required.'); valid = false; }
    else if (!validateEmail(email)) { setErr('signup-email-err', 'Enter a valid email.'); valid = false; }
    if (!pw) { setErr('signup-pw-err', 'Password is required.'); valid = false; }
    else if (pw.length < 8) { setErr('signup-pw-err', 'Must be at least 8 characters.'); valid = false; }
    if (pw !== pw2) { setErr('signup-pw2-err', 'Passwords do not match.'); valid = false; }
    if (!terms) { setErr('terms-err', 'Please accept the terms to continue.'); valid = false; }

    if (valid) showToast('Account created — welcome to Vault ✦');
  });

  // ── TOAST ──
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
  }

  // ── INPUT CLEAR ON FOCUS ──
  document.querySelectorAll('input[type="text"], input[type="email"], input[type="password"]').forEach(input => {
    input.addEventListener('focus', () => {
      const errSpan = input.closest('.field')?.querySelector('.field-error');
      if (errSpan) errSpan.textContent = '';
    });
  });
</script>
</body>
</html>
