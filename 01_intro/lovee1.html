<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>I'm Sorry, My Love 💖</title>
<style>
    body {
        background: linear-gradient(135deg, #ffb3c6, #ffd6e0);
        font-family: "Georgia", serif;
        text-align: center;
        padding-top: 60px;
        overflow: hidden;
    }

    .container {
        background: rgba(255, 255, 255, 0.8);
        padding: 40px;
        margin: auto;
        width: 60%;
        border-radius: 25px;
        box-shadow: 0 0 30px rgba(255, 105, 180, 0.4);
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        color: #ff3366;
        font-size: 40px;
        text-shadow: 0 0 10px rgba(255, 0, 100, 0.3);
    }

    p {
        font-size: 22px;
        color: #444;
    }

    .heart {
        position: absolute;
        bottom: -50px;
        left: 50%;
        font-size: 40px;
        color: #ff3366;
        animation: rise 6s infinite ease-in;
    }

    @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    @keyframes rise {
        0% { transform: translateX(-50%) translateY(0) scale(1); opacity: 0.8; }
        50% { transform: translateX(-50%) translateY(-300px) scale(1.5); opacity: 1; }
        100% { transform: translateX(-50%) translateY(-600px) scale(1); opacity: 0; }
    }

    button {
        background: #ff3366;
        border: none;
        padding: 15px 30px;
        color: white;
        font-size: 20px;
        border-radius: 15px;
        cursor: pointer;
        margin-top: 20px;
        box-shadow: 0 0 15px rgba(255, 0, 100, 0.5);
    }

    button:hover {
        background: #e6005c;
    }

    #extraMessage {
        margin-top: 25px;
        font-size: 24px;
        color: #e6005c;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <h1>I'm Sorry, My Love 💖</h1>
    <p>
        I know I hurt you with my anger…  
        and that’s the last thing I ever want to do.  
        You are someone I treasure with all my heart.  
        I’m truly, deeply sorry.  
    </p>

    <button onclick="showLove()">Tap for my heart</button>

    <p id="extraMessage"></p>
</div>

<script>
function showLove() {
    document.getElementById("extraMessage").innerHTML =
        "I love you more than words can say… Please forgive me 💗";

    // create floating hearts
    for(let i = 0; i < 15; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDuration = (4 + Math.random() * 4) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 7000);
    }
}
</script>

</body>
</html>
