<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Form" />
    <title>My Form</title>
  </head>
  <body>
    <h1>My Form</h1>
    <form action="success.html" method="GET" autocomplete="off">
      <label for="name">Full Name :</label><br />
      <input type="text" name="name" id="name" placeholder="Enter Your Name" />
      <br />
      <br />
      <label for="email">Email Address :</label><br />
      <input
        type="email"
        name="email"
        id="email"
        placeholder="Enter Your Email"
      />
      <br />
      <br />
      <label for="password">Password :</label><br />
      <input
        type="password"
        name="password"
        id="password"
        placeholder="Enter Your Password"
      />
      <br />
      <br />
      <label for="age">Age :</label><br />
      <input type="number" name="age" id="age" placeholder="Enter Your Age" />
      <br />
      <br />
      <label for="dob">DOB :</label><br />
      <input type="datetime-local" name="dob" id="dob" />
      <br />
      <br />
      <label for="color">Fav Color :</label><br />
      <input type="color" name="color" id="color" />
      <br />
      <br />
      <label for="confident">How confident are you in HTML? (1-10) :</label>
      <br />
      <input type="range" name="confident" id="confident" />
      <br />
      <br />
      <label for="upload">Upload Resume :</label><br />
      <input type="file" name="upload" id="upload" />
      <br />
      <br />
      <label for="skills">Skills you know :</label><br />
      <input type="checkbox" name="skills" id="html" />
      <label for="html">HTML</label>
      <input type="checkbox" name="skills" id="css" />
      <label for="css">CSS</label>
      <input type="checkbox" name="skills" id="js" />
      <label for="js">JavaScript</label>
      <br />
      <br />
      <label for="gender">Select your gender</label>
      <input type="radio" name="gender" id="male" value="male" />
      <label for="male">Male</label>
      <input type="radio" name="gender" id="female" value="female" />
      <label for="female">Female</label>
      <input type="radio" name="gender" id="other" value="other" />
      <label for="other">Other</label>
      <br />
      <br />
      <label for="course">Select Course:</label><br />
      <select id="course" name="course">
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="JavaScript">JavaScript</option>
        <option value="React">React</option>
      </select>
      <br />
      <br />
      <label for="about">Tell us about yourself:</label><br />
      <textarea
        id="about"
        name="about"
        rows="5"
        cols="50"
        placeholder="Write anything you want…"
      ></textarea>
      <br />
      <br />
      <input type="hidden" name="formType" value="student_registration" />

      <!-- Reset Button -->
      <button type="reset">Reset Form</button>
 
      <!-- Submit Button -->
      <button type="submit">Submit Form</button>
    </form>
  </body>
</html>
